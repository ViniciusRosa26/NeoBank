services:
  postgres:
    build:
      context: ./db
    environment:
      POSTGRES_DB: neobank
      POSTGRES_PASSWORD: admin
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d neobank"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: neobank
      DB_USERNAME: postgres
      DB_PASSWORD: admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_KEY: changeme-super-secret-jwt-key-with-32-bytes
      JWT_EXPIRATION: 900000
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
